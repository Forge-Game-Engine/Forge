<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge UI — Stress Test (Epic 9)</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      #ui-stress-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #metrics-overlay {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: #e8e8e8;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.6;
        padding: 10px 14px;
        border-radius: 6px;
        min-width: 220px;
        z-index: 9999;
        pointer-events: none;
      }

      #metrics-overlay .label {
        color: #aaa;
      }

      #controls-overlay {
        position: absolute;
        bottom: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: #e8e8e8;
        font-family: Arial, sans-serif;
        font-size: 12px;
        padding: 10px 14px;
        border-radius: 6px;
        z-index: 9999;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      #controls-overlay label {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #controls-overlay input[type='number'],
      #controls-overlay input[type='range'] {
        width: 70px;
        background: #333;
        color: #e8e8e8;
        border: 1px solid #555;
        border-radius: 3px;
        padding: 2px 4px;
      }

      #controls-overlay button {
        background: #444;
        color: #e8e8e8;
        border: 1px solid #666;
        border-radius: 3px;
        padding: 4px 10px;
        cursor: pointer;
      }

      #controls-overlay button:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div id="ui-stress-container"></div>

    <div id="metrics-overlay">
      <div><span class="label">FPS:</span> <span id="m-fps">—</span></div>
      <div><span class="label">Frame&nbsp;ms:</span> <span id="m-frame">—</span></div>
      <div><span class="label">Batches:</span> <span id="m-batches">—</span></div>
      <div><span class="label">Instances:</span> <span id="m-instances">—</span></div>
      <div><span class="label">Heap&nbsp;Δ&nbsp;KB/f:</span> <span id="m-heap">—</span></div>
      <div><span class="label">Elements:</span> <span id="m-elements">—</span></div>
    </div>

    <div id="controls-overlay">
      <label>
        Elements
        <input type="number" id="ctrl-count" min="1" max="5000" step="10" />
      </label>
      <label>
        Anim&nbsp;density&nbsp;(0–10)
        <input type="range" id="ctrl-anim" min="0" max="10" step="1" />
        <span id="ctrl-anim-val">0</span>
      </label>
      <label>
        <input type="checkbox" id="ctrl-clipping" />
        Scroll&nbsp;group
      </label>
      <label>
        <input type="checkbox" id="ctrl-custom-shader" />
        Custom&nbsp;shader
      </label>
      <button id="ctrl-apply">Apply</button>
    </div>

    <script type="module" src="/src/ui-stress-test.ts"></script>

    <script>
      // Populate controls from current URL params and wire up Apply button.
      const params = new URLSearchParams(location.search);

      const countInput = document.getElementById('ctrl-count');
      const animInput = document.getElementById('ctrl-anim');
      const animVal = document.getElementById('ctrl-anim-val');
      const clippingInput = document.getElementById('ctrl-clipping');
      const customShaderInput = document.getElementById('ctrl-custom-shader');

      countInput.value = params.get('count') ?? '200';
      animInput.value = params.get('animations') ?? '3';
      animVal.textContent = animInput.value;
      clippingInput.checked = params.has('clipping');
      customShaderInput.checked = params.has('customShader');

      animInput.addEventListener('input', () => {
        animVal.textContent = animInput.value;
      });

      document.getElementById('ctrl-apply').addEventListener('click', () => {
        const next = new URLSearchParams();

        next.set('count', countInput.value);
        next.set('animations', animInput.value);

        if (clippingInput.checked) {
          next.set('clipping', '1');
        }

        if (customShaderInput.checked) {
          next.set('customShader', '1');
        }

        location.search = next.toString();
      });
    </script>
  </body>
</html>
